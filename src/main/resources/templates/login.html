<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sigh In</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
<div class="container py-4">
  <header class="pb-3 mb-4 border-bottom">
    <a href="/BookMarket/home" class="d-flex align-items-center text-body-emphasis text-decoration-none">
      <img th:src="@{/imgs/book_icon.png}" width="50" height="50" >&nbsp;&nbsp;
      <span class="fs-4">BookMarket</span>
    </a>
  </header>
  <div class="p-5 mb-4 bg-body-tertiary rounded-3">
    <div class="container-fluid py-5">
      <h1 class="display-5 fw-bold">로그인</h1>
      <p class="col-md-8 fs-4">BookMarket</p>
    </div>
  </div>
  <div class="row align-items-md-stretch text-center">
    <div class="container col-md-5">
      <div class="text-center">
        <h3 class="firm-sighin-heading">로그인이 필요합니다.</h3>
      </div>
      <div class="alert alert-danger" th:if="${error}">
        ID 또는 Password가 올바르지 않습니다. <br>
      </div>
      <form class="form-sighin" action="/BookMarket/login" method="post">
        <div class="mb-3 row">
          <input type="text" name="username" class="form-control" placeholder="Input ID" required autofocus>
        </div>
        <div class="mb-3 row">
          <input type="password" name="password" class="form-control" placeholder="Input Password" required>
        </div>
        <div class="mb-3 row">
          <button type="submit" class="btn btn-lg btn-success btn-block">Sigh In</button>
        </div>
      </form>
    </div>
  </div>


  <footer class="pt-3 mt-4 text-body-secondary border-top">
    <span class="text-body-secondary">&copy; BookMarket</span>
  </footer>
</div>
</body>
</html>
